# ================================
# 核心配置
# ================================
title: "你的网站标题"  # 改为你的博客名称
description: "你的网站描述"  # 改为你的描述
baseurl: ""  # 必须留空！这是关键修复点
url: "https://zoeychen02.github.io"  # 你的实际网址
language: "zh-CN"  # 改为中文
timezone: "Asia/Shanghai"  # 中国时区

# ================================
# Jekyll 引擎配置
# ================================
markdown: kramdown
highlighter: rouge
paginate: 5  # 每页显示5篇文章
paginate_path: "/page:num/"  # 分页路径
permalink: /:title/  # 文章永久链接格式

# ================================
# 主题配置 (Jasper2专用)
# ================================
theme: jekyll-theme-jasper2
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# ================================
# 网站外观
# ================================
cover: "assets/images/blog-cover.jpg"  # 首页封面图
logo: "assets/images/logo.png"  # 网站logo
logo_dark: "assets/images/logo-dark.png"  # 深色模式logo
favicon: "assets/images/favicon.ico"  # 网站图标

# ================================
# 社交链接 (按需修改)
# ================================
twitter: yourtwitter
github: zoeychen02  # 你的GitHub账号
email: your@email.com

# ================================
# 评论系统 (Disqus)
# ================================
disqus: false  # 如需启用改为true
disqus_shortname: "your-disqus-shortname"  # 你的Disqus账号

# ================================
# 谷歌分析 (按需添加)
# ================================
google_analytics: "UA-XXXXX-X"  # 你的GA跟踪ID

# ================================
# 作者信息 (需配套修改_data/authors.yml)
# ================================
default_author: your_name  # 默认作者名

# ================================
# 排除文件 (不要修改)
# ================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .gitignore
  - README.md
  - LICENSE
